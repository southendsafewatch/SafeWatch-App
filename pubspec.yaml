name: safewatch
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  google_maps_flutter: ^2.6.1

  # Audio
  audioplayers: ^6.0.0

  # Icons
  cupertino_icons: ^1.0.8

  # MAP SYSTEM (OpenStreetMap)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Firebase (correct versions for your project)
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0

  # Geo utilities
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  geoflutterfire_plus: ^0.0.34

  # UI + State
  provider: ^6.1.5+1
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/alert.mp3
